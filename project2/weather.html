<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="enter city name" spellcheck="false">
            <button><img src="search.png"></button>
        </div>
        <div class="error">
            <p>Invalid city name</p>
        </div>
        <div class="weather">
            <img src="rain.png" class="weather-icon">
            <h1 class="temp">22°c</h1>
            <h2 class="city"> New York</h2>
            <div class="details">
                <div class="col">
                    <img src="humidity.png">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="wind.png">
                    <div>
                        <p class="wind">15km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
     <script>
        const apiKey = "40630c379c49480154fb02b58fae2500";
        const apiUrl ="https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

        

        const searchBox= document.querySelector(".search input");
        const searchBtn= document.querySelector(".search button");
        const weatherIcon = document.querySelector(".weather-icon");
        const errorb = document.querySelector(".error");   
        const weatherb = document.querySelector(".weather");


        async function checkWeather(city){
            const response = await fetch(apiUrl + city + `&appid=${apiKey}`);
            const data = await response.json();

            
            if(response.status == 404) {
               errorb.style.display="block";
               errorb.querySelector("p").innerHTML= "Invalid city name";
               weatherb.style.display = "none";
            }
            
            
            else{
                document.querySelector(".city").innerHTML = data.name;
                document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + "°c";
                document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
                document.querySelector(".wind").innerHTML = data.wind.speed + "km/h";
                
                
                if(data.weather[0].main == "Clouds"){
                 weatherIcon.src = "clouds.png";
            }
            else if(data.weather[0].main == "Clear"){
                weatherIcon.src = "clear.png";
            }
            else if (data.weather[0].main == "Rain"){
                weatherIcon.src = "rain.png";
            }
            else if (data.weather[0].main == "Wind"){
                weatherIcon.src = "wind.png";
            }
            else if (data.weather[0].main == "Snow"){
                weatherIcon.src = "snow.png";
            }
            else if (data.weather[0].main == "Mist"){
                weatherIcon.src = "Mist.png";
            }
            else if (data.weather[0].main == "Drizzle"){
                weatherIcon.src = "drizzle.png";
            }
            else if (data.weather[0].main == "Mist"){
                weatherIcon.src = "mist.png";
            }
            else {
                weatherIcon.src = "humidity";
            }
            
            weatherb.style.display = "block";
            errorb.style.display = "none";
            
        }
    }
    
    
    searchBox.addEventListener("keypress",(e)=>{
        if(e.key == "Enter"){
            if(searchBox.value.trim() == ""){
                errorb.style.display ="block";
                errorb.querySelector("p").innerHTML ="Please enter a correct city name";
                weatherb.style.display = "none";
                return;
            }
            checkWeather(searchBox.value.trim());
        }
    })      
    searchBtn.addEventListener("click",()=>{
        
            if(searchBox.value.trim() == ""){
                errorb.style.display ="block";
                errorb.querySelector("p").innerHTML ="Please enter a correct city name";
                weatherb.style.display = "none";
                return;
            }
            checkWeather(searchBox.value.trim());
        
    })      

      
        
     </script>

</body>

</html>
